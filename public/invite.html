<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Shared Living</title>
  <!-- Modern sleek typography -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #070913;
      --surface: rgba(14, 19, 36, 0.7);
      --accent: #6366F1;
      --accent-hover: #4F46E5;
      --text: #F1F5F9;
      --text-muted: #94A3B8;
      --border: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Vibrant decorative background circles */
    .bg-circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      z-index: 1;
    }

    .circle-1 {
      width: 300px;
      height: 300px;
      background: var(--accent);
      top: -50px;
      left: -50px;
    }

    .circle-2 {
      width: 400px;
      height: 400px;
      background: #EC4899;
      bottom: -100px;
      right: -100px;
    }

    /* Glassmorphism main card */
    .card {
      width: 90%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 40px 30px;
      text-align: center;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      z-index: 10;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-container {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--accent), #EC4899);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
    }

    .logo-container svg {
      width: 36px;
      height: 36px;
      fill: white;
    }

    h1 {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      background: linear-gradient(to right, #FFFFFF, #E2E8F0);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      font-weight: 800;
      font-size: 16px;
      text-decoration: none;
      transition: all 0.25s ease;
      cursor: pointer;
      margin-bottom: 14px;
      border: none;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 8px 16px rgba(99, 102, 241, 0.2);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 12px 20px rgba(99, 102, 241, 0.3);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    .status-text {
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
      margin-top: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* Small spinner for status */
    .spinner {
      width: 12px;
      height: 12px;
      border: 2px solid rgba(99, 102, 241, 0.3);
      border-radius: 50%;
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="bg-circle circle-1"></div>
  <div class="bg-circle circle-2"></div>

  <div class="card">
    <div class="logo-container">
      <!-- House SVG Icon -->
      <svg viewBox="0 0 24 24">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
    </div>

    <h1>Household Invitation</h1>
    <p>You've been invited to join a household on <strong>Shared Living</strong>. Click below to launch the app and accept your invitation.</p>

    <!-- Trigger link button -->
    <a id="open-btn" class="btn btn-primary" href="#">Open in App</a>
    
    <!-- Fallback download button -->
    <a id="download-btn" class="btn btn-secondary" href="#">Download App</a>

    <div class="status-text" id="status">
      <div class="spinner"></div>
      Connecting to app...
    </div>
  </div>

  <script>
    // Extract token from pathname (e.g. /invite/fdc5f0d5-1e3e-4e36-8125-94722cd935ea)
    const pathname = window.location.pathname;
    const token = pathname.substring(pathname.lastIndexOf('/') + 1);

    // Detect user agent for smart redirect
    const userAgent = navigator.userAgent || navigator.vendor || window.opera;
    const isAndroid = /android/i.test(userAgent);
    const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;

    // Dynamic app schemes
    let appScheme = `sharedliving://invite/${token}`;
    if (isAndroid) {
      appScheme = `intent://invite/${token}#Intent;scheme=sharedliving;package=com.jeevan0714.sharedliving;end;`;
    }

    const openBtn = document.getElementById('open-btn');
    const downloadBtn = document.getElementById('download-btn');
    const statusText = document.getElementById('status');

    // Configure the buttons
    openBtn.href = appScheme;

    let storeUrl = "https://play.google.com/store/apps/details?id=com.jeevan0714.sharedliving"; // Default Play Store
    if (isIOS) {
      // Replace with Apple App Store link if published, otherwise a general search or details page
      storeUrl = "https://apps.apple.com/app/shared-living/id123456789"; 
    }
    downloadBtn.href = storeUrl;

    // Auto-launch the app directly
    function attemptRedirect() {
      if (isAndroid) {
        window.location.href = appScheme;
      } else {
        window.location.href = `sharedliving://invite/${token}`;
      }
      
      // If the app is not installed, the page will not blur or hide.
      // After 2 seconds, update the status message and suggest download.
      setTimeout(() => {
        if (!document.hidden) {
          statusText.innerHTML = "App not opening? Click 'Download App' to install it.";
        }
      }, 2000);
    }

    // Run redirect immediately on load
    window.onload = attemptRedirect;
  </script>
</body>
</html>
