<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Wrap – House Sync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #0b0d19;
      --card-bg: #ffffff;
      --text-main: #1e1b4b;
      --text-muted: #64748b;
      --indigo: #6366f1;
      --cyan: #06b6d4;
      --border: rgba(99,102,241,0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-dark);
      background-image:
        radial-gradient(circle at 10% 20%, rgba(99,102,241,0.12) 0%, transparent 45%),
        radial-gradient(circle at 90% 80%, rgba(6,182,212,0.12) 0%, transparent 45%);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%; max-width: 440px;
      display: flex; flex-direction: column; gap: 16px;
      animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1);
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── Card ── */
    .wrap-card {
      background: var(--card-bg);
      border-radius: 36px;
      padding: 20px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.4);
      display: flex; flex-direction: column; gap: 18px;
    }

    /* Header */
    .card-header { display:flex; justify-content:space-between; align-items:center; }
    .brand-row   { display:flex; align-items:center; gap:6px; }
    .brand-icon  {
      width:24px; height:24px; border-radius:8px;
      background:linear-gradient(135deg,var(--indigo),var(--cyan));
      display:flex; align-items:center; justify-content:center; color:#fff;
      box-shadow:0 4px 10px rgba(99,102,241,0.2);
    }
    .brand-icon svg { width:14px; height:14px; fill:currentColor; }
    .brand-name    { font-size:15px; font-weight:800; color:var(--text-main); letter-spacing:-0.2px; }
    .brand-tagline { font-size:9px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }
    .share-btn {
      width:36px; height:36px; border-radius:50%; background:#f1f5f9; border:none;
      display:flex; align-items:center; justify-content:center; color:var(--text-main);
      cursor:pointer; transition:all 0.2s;
    }
    .share-btn:hover { background:#e2e8f0; transform:scale(1.05); }

    /* Profile row */
    .profile-row { display:flex; justify-content:space-between; align-items:center; }

    /* Crew side */
    .crew-col { display:flex; flex-direction:column; gap:8px; width:110px; }
    .crew-avatars { display:flex; align-items:center; }
    .crew-av {
      width:28px; height:28px; border-radius:50%;
      border:2px solid #fff; background:#e2e8f0;
      display:flex; align-items:center; justify-content:center;
      font-size:10px; font-weight:800; color:#334155;
    }
    .crew-av + .crew-av { margin-left:-8px; }
    .crew-plus {
      background:var(--cyan); color:#fff; font-size:9px; font-weight:800;
      padding:3px 6px; border-radius:8px; margin-left:4px;
      box-shadow:0 2px 6px rgba(6,182,212,0.3);
    }
    .crew-label { display:flex; align-items:center; gap:4px; color:var(--indigo); font-size:9.5px; font-weight:800; text-transform:uppercase; letter-spacing:0.5px; }
    .crew-label svg { width:12px; height:12px; fill:currentColor; }

    /* Main traveler */
    .main-traveler { display:flex; flex-direction:column; align-items:center; flex:1; }
    .av-ring {
      padding:3px; border-radius:50%;
      border:2px solid var(--indigo); margin-bottom:6px;
      box-shadow:0 4px 12px rgba(99,102,241,0.15);
    }
    .av-inner {
      width:58px; height:58px; border-radius:50%;
      background:linear-gradient(135deg,#e0e7ff,#c7d2fe);
      display:flex; align-items:center; justify-content:center;
      font-size:22px; font-weight:800; color:#3730a3;
    }
    .traveler-name { font-size:14px; font-weight:800; color:var(--text-main); }
    .traveler-city { font-size:9px; color:var(--indigo); font-weight:800; text-transform:uppercase; letter-spacing:0.5px; margin-top:1px; }

    /* Duration gauge */
    .duration-col { display:flex; flex-direction:column; align-items:center; width:110px; gap:6px; }
    .gauge-wrap   { position:relative; width:60px; height:60px; display:flex; align-items:center; justify-content:center; }
    .gauge-svg    { width:100%; height:100%; transform:rotate(-90deg); }
    .gauge-bg     { fill:none; stroke:#f1f5f9; stroke-width:4.5px; }
    .gauge-fill   { fill:none; stroke:var(--cyan); stroke-width:4.5px; stroke-linecap:round; stroke-dasharray:170; }
    .gauge-text   { position:absolute; display:flex; flex-direction:column; align-items:center; }
    .gauge-num    { font-size:14px; font-weight:800; color:var(--text-main); line-height:1; }
    .gauge-unit   { font-size:7px; color:var(--cyan); font-weight:800; text-transform:uppercase; margin-top:1px; }
    .dur-label    { display:flex; align-items:center; gap:3px; color:var(--text-muted); font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:0.5px; }
    .dur-label svg { width:10px; height:10px; fill:currentColor; }

    /* ── Road Panel ── */
    .road-panel {
      position:relative; width:100%; height:300px;
      border-radius:24px; overflow:hidden;
    }
    .road-bg {
      position:absolute; inset:0;
      background:linear-gradient(170deg,#080c24 0%,#0b1a3a 35%,#063b2a 70%,#042a1e 100%);
    }
    .road-bg::before {
      content:''; position:absolute;
      top:-40px; left:50%; transform:translateX(-50%);
      width:260px; height:180px;
      background:radial-gradient(ellipse,rgba(249,115,22,0.12) 0%,transparent 70%);
    }
    .road-bg::after {
      content:''; position:absolute;
      bottom:0; left:50%; transform:translateX(-50%);
      width:300px; height:140px;
      background:radial-gradient(ellipse,rgba(6,182,212,0.1) 0%,transparent 70%);
    }
    .road-svg { position:absolute; inset:0; width:100%; height:100%; z-index:1; }

    /* Checkpoint badges */
    .cp {
      position:absolute; z-index:3;
      background:rgba(255,255,255,0.1); backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.18); border-radius:20px;
      padding:4px 11px 4px 7px;
      display:flex; align-items:center; gap:6px;
      white-space:nowrap; cursor:pointer;
      transition:all 0.2s;
    }
    .cp:hover { background:rgba(255,255,255,0.16); transform:translateY(-2px); }
    .cp::after {
      content:''; position:absolute;
      bottom:-5px; left:50%; transform:translateX(-50%);
      border:5px solid transparent; border-top-color:rgba(255,255,255,0.18);
    }
    .cp-dot { width:7px; height:7px; border-radius:50%; background:#22d3ee; box-shadow:0 0 8px rgba(34,211,238,0.9); flex-shrink:0; }
    .cp-dot.end { background:#f97316; box-shadow:0 0 8px rgba(249,115,22,0.9); }
    .cp-label { font-size:10.5px; font-weight:700; color:#fff; }
    .cp-day   { font-size:9px; font-weight:500; color:rgba(255,255,255,0.45); }

    .more-note {
      position:absolute; bottom:12px; right:14px; z-index:3;
      font-size:10px; font-weight:800; color:rgba(255,255,255,0.6);
      text-align:right; line-height:1.4; text-shadow:0 1px 4px rgba(0,0,0,0.5);
    }

    /* Footer */
    .card-footer { border-top:1px solid var(--border); padding-top:14px; display:flex; flex-direction:column; gap:10px; }
    .footer-top  { display:flex; justify-content:space-between; align-items:center; }
    .trip-title  { font-size:14.5px; font-weight:800; color:var(--text-main); }
    .stats-box   { display:flex; align-items:center; gap:12px; }
    .stat-pill   { display:flex; align-items:center; gap:4px; font-size:10.5px; font-weight:700; color:var(--text-muted); }
    .stat-pill svg { width:12px; height:12px; fill:var(--indigo); }
    .footer-date { display:flex; align-items:center; gap:4px; color:var(--text-muted); font-size:11px; font-weight:600; }
    .footer-date svg { width:12px; height:12px; fill:currentColor; }

    /* Buttons */
    .actions { display:flex; gap:12px; width:100%; }
    .btn { flex:1; border-radius:16px; padding:14px; font-size:14px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; transition:all 0.2s; font-family:'Outfit',sans-serif; }
    .btn-primary   { background:#fff; color:#0b0d19; border:none; box-shadow:0 4px 12px rgba(255,255,255,0.12); }
    .btn-primary:hover { background:#f1f5f9; transform:translateY(-1px); }
    .btn-secondary { background:rgba(255,255,255,0.05); color:#fff; border:1px solid rgba(255,255,255,0.1); }
    .btn-secondary:hover { background:rgba(255,255,255,0.09); transform:translateY(-1px); }

    /* Real House Sync logo image */
    .hs-logo {
      height: 30px;
      width: auto;
      /* Dark filter for the white card header (logo has light text on transparent bg) */
      filter: brightness(0) saturate(100%) invert(22%) sepia(60%) saturate(600%) hue-rotate(213deg) brightness(90%);
    }

    /* Real House Sync logo image */
    .hs-logo {
      height: 30px;
      width: auto;
      /* Dark filter for the white card header (logo has light text on transparent bg) */
      filter: brightness(0) saturate(100%) invert(22%) sepia(60%) saturate(600%) hue-rotate(213deg) brightness(90%);
    }

    /* Real House Sync logo image */
    .hs-logo {
      height: 30px;
      width: auto;
      /* Dark filter for the white card header (logo has light text on transparent bg) */
      filter: brightness(0) saturate(100%) invert(22%) sepia(60%) saturate(600%) hue-rotate(213deg) brightness(90%);
    }
  </style>
</head>
<body>

<div class="container">
  <div class="wrap-card" id="wrapCard"></div>
  <div class="actions" id="actionBtns"></div>
</div>

<script>
// ════════════════════════════════════════════════════════════
//  ✏️  EDIT THIS DATA OBJECT — THE ENTIRE CARD AUTO-UPDATES
// ════════════════════════════════════════════════════════════
const TRIP_DATA = {
  tripName:      "Karnataka Adventure",
  mainTraveler:  { initials: "SJ", name: "Sarah J.", city: "Bangalore" },
  startDate:     "Jan 10",
  endDate:       "Jan 18, 2024",
  durationDays:  8,
  kmCovered:     "1,250 km",
  activities:    25,

  // ── Add/remove crew members here ──────────────────────
  crew: [
    { initials: "DM" },
    { initials: "ER" },
    { initials: "KP" },
    { initials: "AN" },
    { initials: "RV" },
  ],
  maxVisibleCrew: 3,   // how many avatars show before "+N" pill

  // ── Add/remove stops here (max ~8 look great visually) ─
  stops: [
    { emoji: "📍", name: "Sakleshpur",          day: 1 },
    { emoji: "⛰️", name: "Mullayanagiri",       day: 3 },
    { emoji: "🌊", name: "Jog Falls",            day: 5 },
    { emoji: "🛕", name: "Hampi",                day: 7 },
    { emoji: "✈️", name: "Kempegowda Airport",   day: 8, isEnd: true },
  ],

  // Extra stops not shown on the map (auto-calculated from a total)
  totalStops: 19,
};
// ════════════════════════════════════════════════════════════

// ── Helpers ──────────────────────────────────────────────────
function svgHouseIcon() {
  return `<svg viewBox="0 0 24 24"><path d="M12 3L2 12h3v8h14v-8h3L12 3zm0 13c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3z"/></svg>`;
}
function svgShareIcon(w=18,h=18) {
  return `<svg width="${w}" height="${h}" fill="currentColor" viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>`;
}
function svgPeopleIcon() {
  return `<svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>`;
}
function svgClockIcon() {
  return `<svg width="10" height="10" fill="currentColor" viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>`;
}
function svgPinIcon() {
  return `<svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>`;
}
function svgListIcon() {
  return `<svg viewBox="0 0 24 24"><path d="M4 10.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zm0-6c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zm0 12c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zm3-12v2h14v-2H7zm0 14h14v-2H7v2zm0-6h14v-2H7v2z"/></svg>`;
}
function svgCalIcon() {
  return `<svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>`;
}

// ── Build crew avatar stack ───────────────────────────────────
function buildCrewAvatars(crew, max) {
  const visible = crew.slice(0, max);
  const extra   = crew.length - max;
  const avHtml  = visible.map(c => `<div class="crew-av">${c.initials}</div>`).join('');
  const plusHtml = extra > 0 ? `<span class="crew-plus">+${extra}</span>` : '';
  return `
    <div class="crew-col">
      <div class="crew-avatars">${avHtml}${plusHtml}</div>
      <div class="crew-label">
        ${svgPeopleIcon()}
        Trip Crew (${crew.length})
      </div>
    </div>`;
}

// ── Build duration gauge ──────────────────────────────────────
function buildGauge(days) {
  // Full circle = 170, fill proportionally (cap at 100% = 14 days)
  const pct    = Math.min(days / 14, 1);
  const offset = 170 - (170 * pct);
  return `
    <div class="duration-col">
      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 60 60">
          <circle class="gauge-bg" cx="30" cy="30" r="27"/>
          <circle class="gauge-fill" cx="30" cy="30" r="27" style="stroke-dashoffset:${offset}"/>
        </svg>
        <div class="gauge-text">
          <span class="gauge-num">${days}</span>
          <span class="gauge-unit">Days</span>
        </div>
      </div>
      <div class="dur-label">${svgClockIcon()} Duration</div>
    </div>`;
}

// ── Build cinematic road SVG + checkpoint badges ──────────────
function buildRoadPanel(stops, totalStops) {
  const W = 400, H = 300;
  const roadTop = 65, roadBot = 275;
  const n = stops.length;

  // Node positions distributed linearly along the perspective road Y axis
  // Stops[0] = bottom/start, stops[n-1] = top/destination
  const nodePositions = stops.map((_, i) => {
    // t=0 → bottom, t=1 → top
    const t   = i / Math.max(n - 1, 1);
    const y   = roadBot - t * (roadBot - roadTop);
    // Perspective X convergence: wider at bottom, narrower at top
    const xOff = (1 - t) * 8;
    const x   = W / 2 + (i % 2 === 0 ? -xOff : xOff); // slight left/right sway
    // Node radius shrinks with distance
    const r   = 10 - t * 5;
    return { x, y, r, t, stop: stops[i] };
  });

  // SVG background + road
  const svgContent = `
    <svg class="road-svg" viewBox="0 0 ${W} ${H}" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Mountains -->
      <path d="M -20 200 L 60 110 L 130 200 Z"  fill="#063b2a" opacity="0.55"/>
      <path d="M 80  200 L 180 80  L 280 200 Z"  fill="#063b2a" opacity="0.5"/>
      <path d="M 220 200 L 310 95  L 410 200 Z"  fill="#063b2a" opacity="0.5"/>
      <path d="M 300 200 L 370 130 L 440 200 Z"  fill="#042a1e" opacity="0.6"/>
      <!-- Forest floor -->
      <path d="M -20 300 Q 100 220, 210 265 T 420 270 L 420 300 Z" fill="#042a1e" opacity="0.8"/>
      <path d="M -20 300 Q 80  240, 200 280 T 420 300 Z"           fill="#031f18" opacity="0.95"/>
      <!-- Pines left -->
      <polygon points="28,255 22,268 34,268"  fill="#042a1e"/>
      <polygon points="28,260 20,275 36,275"  fill="#031f18"/>
      <polygon points="46,260 41,271 51,271"  fill="#042a1e"/>
      <!-- Pines right -->
      <polygon points="340,258 334,271 346,271" fill="#042a1e"/>
      <polygon points="340,263 332,278 348,278" fill="#031f18"/>
      <polygon points="358,262 352,274 364,274" fill="#042a1e"/>

      <!-- Road surface -->
      <path d="M 120 300 Q 240 180, 192 120 Q 170 90, 204 65 L 214 65 Q 182 90, 204 120 Q 260 180, 260 300 Z" fill="#0f172a"/>
      <!-- Road glow -->
      <path d="M 120 300 Q 240 180, 192 120 Q 170 90, 204 65 L 214 65 Q 182 90, 204 120 Q 260 180, 260 300 Z" fill="url(#roadGlow)" opacity="0.3"/>
      <!-- Road edges -->
      <path d="M 120 300 Q 240 180, 192 120 Q 170 90, 204 65" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 260 300 Q 260 180, 204 120 Q 182 90, 214 65" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Centre dashes -->
      <path d="M 190 300 Q 250 180, 198 120 Q 176 90, 209 65" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-dasharray="10,12" stroke-linecap="round" fill="none"/>

      <!-- Dynamic Nodes -->
      ${nodePositions.map(({ x, y, r, stop }) => {
        const isEnd   = stop.isEnd;
        const cyanA   = `rgba(34,211,238,`;
        const orangeA = `rgba(249,115,22,`;
        const col     = isEnd ? '#f97316' : '#22d3ee';
        const rc      = isEnd ? orangeA : cyanA;
        return `
          <circle cx="${x}" cy="${y}" r="${r + 4}" fill="${rc}0.12)" stroke="${rc}0.4)" stroke-width="1"/>
          <circle cx="${x}" cy="${y}" r="${r}"      fill="${col}"       style="filter:drop-shadow(0 0 ${r}px ${col})"/>`;
      }).join('')}

      <defs>
        <linearGradient id="roadGlow" x1="0.5" y1="1" x2="0.5" y2="0">
          <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0"/>
          <stop offset="60%"  stop-color="#22d3ee" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#f97316" stop-opacity="0.25"/>
        </linearGradient>
      </defs>
    </svg>`;

  // Generate checkpoint badge HTML (alternating left / right)
  const PANEL_H = 300;
  const badgeHtml = nodePositions.map(({ x, y, t, stop }, i) => {
    // Convert SVG coords to CSS panel coords (viewBox 400×300 → 100%×300px)
    const topPx  = (y / H) * PANEL_H;
    const isLeft = i % 2 !== 0;   // alternate: even=right, odd=left
    const posStyle = isLeft
      ? `top:${topPx - 22}px; left:10px;`
      : `top:${topPx - 22}px; right:10px;`;
    const dotClass = stop.isEnd ? 'cp-dot end' : 'cp-dot';
    return `
      <div class="cp" style="${posStyle}">
        <div class="${dotClass}"></div>
        <span class="cp-label">${stop.emoji} ${stop.name}</span>
        <span class="cp-day">Day ${stop.day}</span>
      </div>`;
  }).join('');

  // "…and N more" footnote
  const shown   = stops.length;
  const hidden  = totalStops - shown;
  const moreHtml = hidden > 0
    ? `<div class="more-note">…and ${hidden} more<br>stops explored!</div>`
    : '';

  return `
    <div class="road-panel">
      <div class="road-bg"></div>
      ${svgContent}
      ${badgeHtml}
      ${moreHtml}
    </div>`;
}

// ── Assemble card HTML ────────────────────────────────────────
